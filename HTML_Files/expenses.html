<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel = "stylesheet" href = "../CSS_Files/styles.css">
    <title>EWallet Expenses</title>
</head>
<body>
    <div id = "intro">
        <h1 class = "title">EWallet Expenses</h1>

        <h2>
            <img src = "../Pictures/usernameIcon.png" alt = "Username Icon" id = "usernameIcon">
            (Username)
        </h2>

        <div id = "optionButtons">
            <button id = "incomeButton" onclick = "window.location.href = 'income.html'"><h2>Income</h2></button>
            <button id = "mainPageButton" onclick = "window.location.href = '../index.html'"><h2>Main Page</h2></button>
            <button id = "planningButton" onclick = "window.location.href = 'planning.html'"><h2>Planning</h2></button>
            <button id = "summaryButton" onclick = "window.location.href = 'financialSummary.html'"><h2>Summary</h2></button>
        </div>
    </div>

    <section>
        <h1 class = "title">Expenses</h1>

        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints1">
        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints2">

        <div class = "incomeSum">
            <p class = "listName">Total Amount:</p> 
            <h3 class = "moneyAmount" id = "totalAmountDisplay">$0.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">Expenses For the Month:</p>
            <h3 class = "moneyAmount" id = "monthAmountDisplay">$0.00</h3>
        </div><br><br>

        <form id = "expenseForm" onsubmit = "event.preventDefault();">
            <label for = "expensesDate">Date:</label>
            <input type = "date" id = "expensesDate" name = "date" required><br><br>
            
            <label for = "expensesSource">Source:</label>
            <input type = "text" id = "expensesSource" name = "source" placeholder = "Bills, Gift, etc." required><br><br>

            <label for = "expensesAmount">Amount:</label>
            <input type = "number" id = "expensesAmount" name = "amount" placeholder = "0.00" step = "0.01" required><br><br>

            <label for = "expensesCategory">Category:</label>
            <select id = "expensesCategory" name = "category" required style="padding: 4px; border-radius: 4px;">
                <option value="Tech">Tech</option>
                <option value="Fun">Fun</option>
                <option value="General">General</option>
            </select><br><br>

            <label for = "expensesNotes">Notes:</label>
            <textarea id = "expensesNotes" name = "notes" placeholder = "Additional notes"></textarea><br><br>

            <button type = "submit" id = "submitBtn">Add Expense</button>
        </form>
    </section>

    <section>
        <h1 class = "title">Expense Entries</h1>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Source</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id = "expenseEntriesTableBody"></tbody>
        </table>
    </section>
    <script src="/app.js"></script>
</body>
</html>
