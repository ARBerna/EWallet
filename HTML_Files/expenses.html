<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS_Files/styles.css">
    <title>EWallet Expenses</title>
</head>
<body>

    <header id="intro">
        <h1 class="title">EWallet Expenses</h1>

        <div class="user-profile">
            <img src="../Pictures/usernameIcon.png" alt="User Profile Icon" id="usernameIcon">
            <span class="username">(Username)</span>
        </div>

        <!-- Navigation container -->
        <nav id="optionButtons" aria-label="Main Navigation">
            <a href="income.html" class="btn" id="incomeButton">Income</a>
            <a href="../index.html" class="btn" id="mainPageButton">Main Page</a>
            <a href="planning.html" class="btn" id="planningButton">Planning</a>
        </nav>
    </header>

    <main>
        <section id="expenseSummary" aria-labelledby="expensesHeading">
            <h2 class="title" id="expensesHeading">Expenses</h2>

            <img src="../Pictures/PawPrints.png" alt="" role="presentation" id="pawPrints1">
            <img src="../Pictures/PawPrints.png" alt="" role="presentation" id="pawPrints2">

            <div class="summary-container">
                <div class="expense-sum">
                    <p class="summary-label">Total Amount:</p> 
                    <h3 class="money-amount" id="totalAmountDisplay">$0.00</h3>
                </div>

                <div class="expense-sum">
                    <p class="summary-label">Expenses For the Month:</p>
                    <h3 class="money-amount" id="monthAmountDisplay">$0.00</h3>
                </div>
            </div>

            <!-- Form handles additions natively via client event loops inside app.js -->
            <form id="expenseForm">
                <div class="form-group">
                    <label for="expensesDate">Date:</label>
                    <input type="date" id="expensesDate" name="date" required>
                </div>
                
                <div class="form-group">
                    <label for="expensesSource">Source:</label>
                    <input type="text" id="expensesSource" name="source" placeholder="Bills, Gift, etc." required>
                </div>

                <div class="form-group">
                    <label for="expensesAmount">Amount:</label>
                    <input type="number" id="expensesAmount" name="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="expensesCategory">Category:</label>
                    <select id="expensesCategory" name="category" required>
                        <option value="Tech">Tech</option>
                        <option value="Fun">Fun</option>
                        <option value="General">General</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="expensesNotes">Notes:</label>
                    <textarea id="expensesNotes" name="notes" placeholder="Additional notes"></textarea>
                </div>

                <button type="submit" id="submitBtn">Add Expense</button>
            </form>
        </section>

        <!-- Section: Responsive interactive entry workspace data grid -->
        <section id="expenseEntries" aria-labelledby="entriesHeading">
            <h2 class="title" id="entriesHeading">Expense Entries</h2>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Source</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenseEntriesTableBody">
                        <!-- Dynamic elements populated natively via module mapping strings -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Unified modular client initialization entry target link point -->
    <script type="module" src="../app.js"></script>
</body>
</html>
