<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../Pictures/appLogo.png">
    <link rel = "stylesheet" href = "../CSS_Files/styles.css">
    <script src = "https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <title>EWallet Financial Summary</title>
</head>
<body>
    <a href="../index.html" class="app-logo-link" aria-label="Return to Main Page"></a>
    <img src="../Pictures/appIcon.png" alt="EWallet Logo" class="app-logo-icon">
    <div id = "intro">
        <h1 class = "title">EWallet Financial Summary</h1>

        <h2>
            <img src = "../Pictures/usernameIcon.png" alt = "Username Icon" id = "usernameIcon">
            <span class="username-text">(Username)</span>
        </h2>

        <div id = "optionButtons">
            <button id = "incomeButton" onclick = "window.location.href = 'income.html'"><h2>Income</h2></button>
            <button id = "expenseButton" onclick = "window.location.href = 'expenses.html'"><h2>Expenses</h2></button>
            <button id = "planningButton" onclick = "window.location.href = 'planning.html'"><h2>Planning</h2></button>
            <button id = "mainPageButton" onclick = "window.location.href = '../index.html'"><h2>Main Page</h2></button>
        </div>
    </div>

    <section>
        <h1 class = "title">Financial Summary</h1>

        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints6">
        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints7">

        <div class = "incomeSum">
            <p class = "listName">Total Amount:</p> 
            <h3 class = "moneyAmount" id = "totalAmount">$0.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">Income This Month:</p>
            <h3 class = "moneyAmount" id = "incomeMonth">$0.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">Expenses This Month:</p>
            <h3 class = "moneyAmount" id = "expensesMonth">$0.00</h3>
        </div><br><br>

    </section>

    <section>
        <h1 class = "title">Expense vs. Income Breakdown</h1>
        <div id = "chartContainer" style = "width: 500px; height: 500px; margin: 0 auto;">
            <canvas id = "pieChart"></canvas>
        </div>
    </section>

    <script type = "module" src = "../JS_Files/financialSummary.js"></script>
</body>
</html>
