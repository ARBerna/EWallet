<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS_Files/styles.css">
    <title>EWallet Planning</title>
</head>
<body>
    <header id="intro">
        <h1 class="title">EWallet Planning</h1>

        <div class="user-profile">
            <img src="../Pictures/usernameIcon.png" alt="User Profile Icon" id="usernameIcon">
            <span class="username">(Username)</span>
      </div>

        <div id = "optionButtons">
            <button id = "incomeButton" onclick = "window.location.href = 'income.html'"><h2>Income</h2></button>
            <button id = "expenseButton" onclick = "window.location.href = 'expenses.html'"><h2>Expenses</h2></button>
            <button id = "mainPageButton" onclick = "window.location.href = '../index.html'"><h2>Main Page</h2></button>
            <button id = "summaryButton" onclick = "window.location.href = 'financialSummary.html'"><h2>Summary</h2></button>
        </div>
    </header>

    <main>
        <section id="planningSummary" aria-labelledby="planningHeading">
            <h2 class="title" id="planningHeading">Planning</h2>

            <img src="../Pictures/PawPrints.png" alt="" role="presentation" id="pawPrints6">
            <img src="../Pictures/PawPrints.png" alt="" role="presentation" id="pawPrints7">

            <div class="summary-container">
                <div id="currentGoal" class="planning-box">
                    <p class="summary-label">Current Goal:</p>
                    <h3 class="money-amount" id="currentGoalDisplay">$0.00</h3>
                </div>

                <div class="planning-box">
                    <p class="summary-label">Total Planned:</p> 
                    <h3 class="money-amount" id="totalPlanningAmountDisplay">$0.00</h3>
                </div>

                <div class="planning-box">
                    <p class="summary-label">Added This Month:</p>
                    <h3 class="money-amount" id="monthPlanningAmountDisplay">$0.00</h3>
                </div>

                <div class="planning-box">
                    <p class="summary-label">Remaining Until Goal:</p>
                    <h3 class="money-amount" id="remainingTillGoalDisplay">$0.00</h3>
                </div>
            </div>
        </section>

        <!-- Create / Modify Planned Purchases -->
        <section id="planningFormSection" aria-labelledby="formHeading">
            <h2 class="title" id="formHeading">Plan Future Purchase</h2>
            
            <form id="planningForm">
                <div class="form-group">
                    <label for="planningDate">Target Date:</label>
                    <input type="date" id="planningDate" name="date" required>
                </div>
                
                <div class="form-group">
                    <label for="planningDescription">Description / Item:</label>
                    <input type="text" id="planningDescription" name="description" placeholder="Laptop, Car Insurance, etc." required>
                </div>

                <div class="form-group">
                    <label for="planningAmount">Estimated Amount:</label>
                    <input type="number" id="planningAmount" name="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <button type="submit" id="submitPlanBtn">Create Plan</button>
            </form>
        </section>

        <!-- View / Modify / Delete Planned Purchases Table -->
        <section id="planningEntries" aria-labelledby="entriesHeading">
            <h2 class="title" id="entriesHeading">Planned Future Purchases</h2>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Target Date</th>
                            <th>Description</th>
                            <th>Estimated Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="planningEntriesTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="../app.js"></script>
</body>
</html>
