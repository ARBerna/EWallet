<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel = "stylesheet" href = "../CSS_Files/styles.css">
    <title>EWallet Planning</title>
</head>
<body>
    <div id = "intro">
        <h1 class = "title">EWallet Planning</h1>

        <h2>
            <img src = "../Pictures/usernameIcon.png" alt = "Username Icon" id = "usernameIcon">
            (Username)
        </h2>

        <div id = "optionButtons">
            <button id = "incomeButton" onclick = "window.location.href = 'income.html'"><h2>Income</h2></button>
            <button id = "expenseButton" onclick = "window.location.href = 'expenses.html'"><h2>Expenses</h2></button>
            <button id = "mainPageButton" onclick = "window.location.href = '../index.html'"><h2>Main Page</h2></button>
        </div>
    </div>

    <section>
        <h1 class = "title">Planning</h1>

        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints6">
        <img src = "../Pictures/PawPrints.png" alt = "Paw Prints" id = "pawPrints7">

        <div id = "currentGoal">
            <p class = "currentGoalText">Current Goal:</p>
            <h3 class = "currentGoalText">$500.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">Total Amount:</p> 
            <h3 class = "moneyAmount">$0.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">Added This Month:</p>
            <h3 class = "moneyAmount">$0.00</h3>
        </div>

        <div class = "incomeSum">
            <p class = "listName">This Much Till Goal</p>
            <h3 class = "moneyAmount">$0.00</h3>
        </div><br><br>

    </section>

    <section>
        
        <form action = "/planning" method = "post">
            <label for = "planningDate">Date:</label>
            <input type = "date" id = "planningDate" name = "date" required><br><br>
            
            <label for = "planningAmount">Amount:</label>
            <input type = "number" id = "planningAmount" name = "amount" placeholder = "0.00" step = "0.01" required><br><br>

            <button type = "submit">Create Plan</button>
        </form>
    </section>
</body>
</html>
