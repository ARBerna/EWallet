<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase Planning</title>
   
    <link rel="stylesheet" href="/CSS_Files/purchase-plan.css">
</head>
<body>

    <div class="purchase-plan-wrapper">
        
        <!-- Data Entry Form -->
        <aside class="plan-form-card">
            <h2>Schedule New Purchase Plan</h2>
            <form id="purchasePlanForm" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="title">Purchase Goal</label>
                    <input type="text" id="title" class="form-input" placeholder="e.g., Pixel 10 Pro Upgrade" required>
                </div>
                <div class="form-group">
                    <label for="amount">Plan Budget ($)</label>
                    <input type="number" id="amount" class="form-input" placeholder="0.00" step="0.01" required>
                </div>
                 <div class="form-group">
                    <label for="category">Purchase Category</label>
                    <select id="category" class="form-input" required style="width: 100%; background-color: #0f172a; color: #fff;">
                        <option value="Tech">Tech</option>
                        <option value="Fun">Fun</option>
                        <option value="General">General</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Plan Execution Date</label>
                    <input type="date" id="date" class="form-input" required>
                </div>
                <button type="submit" class="btn-submit">Schedule Purchase</button>
            </form>
        </aside>

        <!-- Visual List Display -->
        <main class="plan-list-section">
            <div class="plan-list-header">
                <h2>Upcoming Plans</h2>
                <span class="plan-counter" id="totalPlansCount">0 Active Plans</span>
            </div>

            <div id="plansContainer"></div>
        </main>
        
    </div>
    <script src="/app.js"></script>

</body>
</html>
